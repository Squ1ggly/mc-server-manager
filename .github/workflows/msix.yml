name: Package MSIX (Microsoft Store)

# Builds the Windows release binary and packages it as an MSIX for Microsoft
# Store submission. Manual trigger only — this isn't part of the normal
# release flow yet (see release.yml for the .exe/.msi/.dmg/.deb builds that
# run automatically on a version tag).
#
# The produced .msix is uploaded as a workflow artifact, not published
# anywhere. Download it from the finished run and upload it to the app's
# submission page in Partner Center — the Store signs it during
# certification, so this doesn't need a paid code-signing certificate.
#
# Untested end-to-end as of writing (no Windows machine was available to
# verify winapp CLI's exact behavior) — if a step here fails, the fix is
# almost certainly a flag/path adjustment to that step, not a redesign.
on:
  workflow_dispatch:

jobs:
  msix:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # Guard against the v1.6.0-v1.7.5 regression: a "devUrl" in the Tauri
      # config makes the shipped webview load http://localhost:5173 instead of
      # the embedded frontend, so the packaged app opens to a blank
      # "localhost refused to connect" error page. This app has no dev server
      # by design (see beforeDevCommand) - if devUrl ever comes back, fail here
      # rather than shipping a broken package to the Store again.
      - name: Assert no dev server URL is configured
        run: |
          if (Select-String -Path src-tauri\tauri.conf.json -Pattern '"devUrl"' -Quiet) {
            throw "devUrl is set in tauri.conf.json - the packaged app would load a dev server that isn't running."
          }

      # Must be "tauri build", not "cargo build --release". Only the Tauri CLI
      # runs the production build path that embeds dist/ into the binary and
      # serves it over the internal asset protocol. --no-bundle skips the
      # .msi/.exe installers, which the MSIX doesn't need - we only want the
      # compiled binary.
      - name: Build release binary
        run: npx tauri build --no-bundle

      - name: Install winapp CLI
        run: winget install microsoft.winappcli --source winget --accept-package-agreements --accept-source-agreements

      # Stage just what the MSIX needs to contain — the exe, the manifest,
      # and the icon assets it references — rather than the whole target/
      # directory (which is mostly build intermediates).
      #
      # With --no-bundle the CLI skips the productName rename, so the binary
      # lands under the crate name (mc-server-manager.exe); a full bundle run
      # would name it ServerForge.exe instead. Accept either and rename to the
      # name Package.appxmanifest declares, so a build-flag change can't
      # silently break the package. Renaming is safe: the frontend is embedded
      # in the binary, so nothing resolves paths from the executable's name.
      - name: Stage MSIX contents
        run: |
          New-Item -ItemType Directory -Force -Path msix-stage\icons | Out-Null
          $exe = 'ServerForge.exe', 'mc-server-manager.exe' |
            ForEach-Object { Join-Path 'src-tauri\target\release' $_ } |
            Where-Object { Test-Path $_ } |
            Select-Object -First 1
          if (-not $exe) { throw "No release binary found in src-tauri\target\release." }
          Write-Host "Staging $exe"
          Copy-Item $exe msix-stage\ServerForge.exe
          Copy-Item src-tauri\Package.appxmanifest msix-stage\
          Copy-Item src-tauri\icons\* msix-stage\icons\

      # MSIX packages must be signed to be structurally valid, but the
      # signature itself doesn't need to be trusted — the Store re-signs the
      # package during certification. A throwaway self-signed cert is enough
      # to produce a package that's valid to submit.
      - name: Generate throwaway signing cert
        working-directory: msix-stage
        run: winapp cert generate --if-exists skip

      - name: Pack MSIX
        working-directory: msix-stage
        run: winapp pack . --cert .\devcert.pfx

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: serverforge-msix
          path: msix-stage/*.msix
